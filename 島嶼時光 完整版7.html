<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>島嶼時光 ─ 你的溫柔陪伴</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;600&family=Kaisei+Decol:wght@400;700&display=swap" rel="stylesheet">

<style>
/* ════════════════════════════════════════════
   專屬大地色系配置
   ════════════════════════════════════════════ */
:root {
  --color-bg:        #e1d6cc; 
  --color-bg-rainy:  #b6aea8; 
  
  --color-accent:    #9e8f81; 
  --color-accent2:   #8a7b6d;
  --color-progress:  #d2ad8a; 
  
  --ui-bg:  rgba(225, 214, 204, 0.4);
  --text:   #5c5044;
  --muted:  #958b82;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html { background: #e1d6cc; }

body {
  font-family: 'Noto Serif TC', serif;
  min-height: 100vh;
  min-height: 100dvh;
  background: #e1d6cc;
  display: flex;
  flex-direction: column;
  align-items: center;
  overflow-x: hidden;
  -webkit-tap-highlight-color: transparent;
  transition: background-color 1.5s ease;
}

body.rainy-mode {
  background: #b6aea8;
}

/* 入場畫面 */
.intro-overlay {
  position: fixed; top:0; left:0; width:100%; height:100%;
  background: #e1d6cc;
  z-index: 999;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  transition: opacity 1s ease, visibility 1s;
}
.intro-overlay.fade-out { opacity: 0; visibility: hidden; }
.intro-content { text-align: center; }

.intro-orb {
  width: 50px; height: 65px;
  background: #c3a483;
  border-radius: 50px 50px 10px 10px;
  margin: 0 auto 20px;
  position: relative;
  animation: float 3s ease-in-out infinite;
}
.intro-orb::before {
  content: ''; position: absolute;
  width: 4px; height: 15px; background: #6b5c4f;
  bottom: -10px; left: 50%; transform: translateX(-50%);
  border-radius: 2px;
}
.intro-title {
  font-family: 'Kaisei Decol', serif;
  font-size: 1.8rem; color: var(--text); 
  margin-bottom: 8px; letter-spacing: .1em;
}
.intro-subtitle { font-size: .8rem; color: var(--muted); letter-spacing: .15em; }

@keyframes float {
  0%,100% { transform: translateY(0); }
  50%      { transform: translateY(-5px); }
}

/* 主容器 */
.page {
  position: relative; z-index: 1;
  width: 100%; max-width: 480px;
  padding: 20px 20px 60px;
  display: flex; flex-direction: column; align-items: center;
  opacity: 0; transform: translateY(10px);
  transition: opacity 1s ease, transform 1s ease;
}
.page.loaded { opacity: 1; transform: translateY(0); }

/* Header */
.header { text-align: center; margin-bottom: 4px; width: 100%; display: flex; justify-content: space-between; align-items: center; }
.header-title { font-family: 'Kaisei Decol', serif; font-size: 1.3rem; color: var(--text); }
.small-btn {
  background: rgba(200,190,180,0.35); color: var(--text);
  border: 1px solid rgba(149, 139, 130, 0.25); border-radius: 20px;
  padding: 4px 12px; font-size: .7rem; cursor: pointer;
  transition: all .2s;
}
.small-btn:hover { background: rgba(225, 214, 204, 0.9); }

/* 島嶼 Canvas 區塊 (嚴格鎖死在 400x400，保證座標不跑掉) */
.island-section {
  width: 100%; display: flex; flex-direction: column; align-items: center;
  margin-bottom: 8px; position: relative;
}
.island-canvas-wrap {
  width: 100%; max-width: 420px; aspect-ratio: 1/1;
  display: flex; justify-content: center; position: relative;
  background: transparent;
  margin-bottom: 4px;
}
#islandCanvas, #particleCanvas {
  display: block; width: 100%; height: 100%;
  border-radius: 0; position: absolute; top: 0; left: 0;
  background: transparent;
}

/* 引導文字 */
.healing-message-box {
  width: 100%; min-height: 48px; text-align: center;
  font-size: .8rem; color: var(--text);
  margin-bottom: 12px; padding: 0 16px;
  display: flex; align-items: center; justify-content: center;
  line-height: 1.6; transition: opacity .4s;
}

/* 控制面板 */
.timer-panel {
  width: 100%; background: rgba(209,198,188,0.45); border-radius: 20px;
  padding: 16px; box-shadow: none;
  backdrop-filter: blur(4px); display: flex; flex-direction: column;
  align-items: center; gap: 14px; border: 1px solid rgba(180,168,158,0.3);
}

.progress-ring-wrap {
  width: 100%; height: 4px; background: rgba(149, 139, 130, 0.15);
  border-radius: 2px; overflow: hidden; position: relative;
}
.progress-ring-fill {
  height: 100%; width: 0%; background: var(--color-progress);
  transition: width 1s linear;
}

.timer-display-wrap { position: relative; display: flex; flex-direction: column; align-items: center; }
.time-numbers {
  font-family: 'Kaisei Decol', serif; font-size: 2.5rem; font-weight: 700;
  color: var(--text); letter-spacing: 0.05em; line-height: 1;
  transition: filter .4s, opacity .4s;
}
.time-numbers.anxiety-free { filter: blur(6px); opacity: 0.3; }
.anxiety-toggle {
  font-size: .62rem; color: var(--muted); cursor: pointer;
  background: rgba(200,190,180,0.35); padding: 3px 10px; border-radius: 12px;
  margin-top: 6px; border: 1px solid rgba(149, 139, 130, 0.1);
}

.preset-row { display: flex; gap: 6px; justify-content: center; width: 100%; align-items: center; }
.preset-btn {
  flex: 1; padding: 6px 4px; border-radius: 12px; border: 1px solid rgba(149, 139, 130, 0.2);
  background: rgba(225, 214, 204, 0.45); color: var(--text); font-size: .74rem; font-family: inherit;
  cursor: pointer; transition: all .2s ease; white-space: nowrap; background: rgba(200,190,180,0.3);
}
.preset-btn.active {
  background: var(--color-accent); color: #fff; border-color: transparent;
}
.preset-input-wrap { flex: 1; display: flex; align-items: center; }
.preset-input {
  width: 100%; padding: 6px 4px; border-radius: 12px; border: 1px solid rgba(149, 139, 130, 0.2);
  background: rgba(225, 214, 204, 0.45); color: var(--text); font-size: .74rem; font-family: inherit;
  text-align: center; outline: none; -moz-appearance: textfield; 
}
.preset-input::-webkit-outer-spin-button, .preset-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
.preset-input:focus { background: #fff; border-color: var(--color-accent); }

.controls-row { display: flex; gap: 12px; justify-content: center; align-items: center; width: 100%; }
.main-control-btn {
  width: 48px; height: 48px; border-radius: 50%; border: none;
  background: linear-gradient(135deg, var(--color-accent), var(--color-accent2)); color: #fff;
  font-size: 1.1rem; cursor: pointer; display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 10px rgba(138, 123, 109, 0.2); transition: transform .2s;
}
.main-control-btn:hover { transform: scale(1.04); }
.main-control-btn:active { transform: scale(0.96); }
.secondary-control-btn {
  background: rgba(200,190,180,0.35); color: var(--text); border: 1px solid rgba(149, 139, 130, 0.2);
  padding: 8px 16px; border-radius: 16px; font-size: .75rem; cursor: pointer; transition: background .2s;
}
.secondary-control-btn:hover { background: rgba(200,190,180,0.8); }

/* 明信片 Modal */
.postcard-modal {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(92, 80, 68, 0.35); backdrop-filter: blur(6px);
  z-index: 300; display: none; align-items: center; justify-content: center; padding: 16px;
}
.postcard-modal.open { display: flex; }
.postcard-card {
  background: #e1d6cc; width: 100%; max-width: 360px; border-radius: 8px; padding: 16px;
  box-shadow: 0 15px 40px rgba(92, 80, 68, 0.2); display: flex; flex-direction: column; gap: 12px;
  animation: polaroidIn .5s cubic-bezier(.175,.885,.32,1.275) both;
}
@keyframes polaroidIn { from { opacity: 0; transform: scale(0.9) translateY(10px) rotate(-1deg); } to { opacity: 1; transform: scale(1) translateY(0) rotate(0); } }

.postcard-photo-frame { 
  width: 100%; aspect-ratio: 1/1; background: #e1d6cc; 
  border-radius: 4px; overflow: hidden; display: flex; justify-content: center; align-items: center;
}
.postcard-canvas { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }

.postcard-content { display: flex; flex-direction: column; gap: 8px; }
.postcard-meta-row { display: flex; justify-content: space-between; align-items: center; }
.postcard-date { font-size: .65rem; color: var(--muted); font-family: monospace; }
.postcard-stamp {
  width: 32px; height: 32px; border: 2px dashed var(--color-progress); border-radius: 4px;
  display: flex; align-items: center; justify-content: center; font-size: .8rem;
  color: var(--color-progress); transform: rotate(8deg); font-weight: bold;
}
.postcard-warm-quote {
  font-size: .78rem; color: var(--text); line-height: 1.6; font-style: italic;
  padding: 8px 0; border-top: 1px solid rgba(149, 139, 130, 0.15); border-bottom: 1px solid rgba(149, 139, 130, 0.15); text-align: center;
}
.postcard-user-note {
  width: 100%; border: none; border-bottom: 1px dashed rgba(149, 139, 130, 0.3); padding: 4px 0;
  font-family: inherit; font-size: .75rem; color: var(--text); outline: none; text-align: center;
}
.postcard-btns { display: flex; gap: 8px; }
.postcard-btn { flex: 1; padding: 8px 16px; border-radius: 20px; border: none; font-size: .75rem; cursor: pointer; }
.postcard-btn.cancel { background: rgba(149, 139, 130, 0.1); color: var(--text); }
.postcard-btn.save { background: var(--color-accent); color: #fff; }

/* 圖鑑側邊欄 */
.gallery-sidebar {
  position: fixed; top: 0; right: -100%; width: 100%; max-width: 340px; height: 100%;
  background: rgba(225, 214, 204, 0.97); backdrop-filter: blur(8px);
  box-shadow: -4px 0 20px rgba(92, 80, 68, 0.08); z-index: 200;
  transition: right .4s cubic-bezier(.16,1,.3,1); display: flex; flex-direction: column;
}
.gallery-sidebar.open { right: 0; }
.gallery-header { padding: 18px 16px 12px; border-bottom: 1px solid rgba(149, 139, 130, 0.1); display: flex; justify-content: space-between; align-items: center; }
.gallery-header h2 { font-size: 1.1rem; color: var(--text); }
.close-btn { background: none; border: none; font-size: 1.3rem; color: var(--muted); cursor: pointer; }
.gallery-content { flex: 1; overflow-y: auto; padding: 14px; display: flex; flex-direction: column; gap: 14px; }
.gallery-empty { text-align: center; color: var(--muted); font-size: .75rem; margin-top: 60px; line-height: 1.8; }
.postcard-item {
  background: #e1d6cc; border-radius: 6px; padding: 10px; box-shadow: 0 2px 10px rgba(92, 80, 68, 0.04);
  border: 1px solid rgba(149, 139, 130, 0.1); display: flex; flex-direction: column; gap: 8px; cursor: pointer; transition: transform .2s;
}
.postcard-item:hover { transform: translateY(-2px); }
.postcard-item-canvas { width: 100%; aspect-ratio: 1/1; border-radius: 4px; object-fit: cover; background: var(--color-bg); pointer-events: none; }
.postcard-item-meta { display: flex; justify-content: space-between; font-size: .65rem; color: var(--muted); }
.postcard-item-note { font-size: .72rem; color: var(--text); font-style: italic; text-align: center; border-top: 1px dashed rgba(149, 139, 130, 0.15); padding-top: 4px; }

/* 查看大圖 Modal */
.view-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(92, 80, 68, 0.4); backdrop-filter: blur(4px); z-index: 350; display: none; align-items: center; justify-content: center; padding: 16px; }
.view-modal.open { display: flex; }


/* 藍牙 Modal */
.bt-modal {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(92, 80, 68, 0.35); backdrop-filter: blur(6px);
  z-index: 400; display: none; align-items: center; justify-content: center; padding: 24px;
}
.bt-modal.open { display: flex; }
.bt-card {
  background: #e1d6cc; width: 100%; max-width: 340px; border-radius: 20px;
  padding: 28px 24px 20px; box-shadow: 0 15px 40px rgba(92,80,68,0.15);
  display: flex; flex-direction: column; align-items: center; gap: 16px;
  animation: polaroidIn .4s cubic-bezier(.175,.885,.32,1.275) both;
}
.bt-title { font-family: 'Kaisei Decol', serif; font-size: 1.1rem; color: var(--text); text-align: center; }
.bt-subtitle { font-size: .75rem; color: var(--muted); text-align: center; margin-top: -10px; }
.bt-icon-wrap {
  width: 72px; height: 72px; border-radius: 50%;
  background: rgba(149,139,130,0.1); display: flex; align-items: center; justify-content: center;
  position: relative;
}
.bt-icon-wrap.scanning::after {
  content: ''; position: absolute;
  width: 100%; height: 100%; border-radius: 50%;
  border: 2px solid rgba(158,143,129,0.4);
  animation: bt-pulse 1.5s ease-out infinite;
}
@keyframes bt-pulse {
  0% { transform: scale(1); opacity: 1; }
  100% { transform: scale(1.8); opacity: 0; }
}
.bt-cube {
  width: 40px; height: 40px; border-radius: 10px;
  background: linear-gradient(135deg, #c3a483, #9e8f81);
  display: flex; align-items: center; justify-content: center;
  font-size: 1.3rem; box-shadow: 0 4px 10px rgba(158,143,129,0.3);
}
.bt-device-row {
  width: 100%; border: 1px solid rgba(149,139,130,0.2); border-radius: 14px;
  padding: 12px 14px; display: flex; align-items: center; justify-content: space-between;
  background: rgba(225, 214, 204, 0.9);
}
.bt-device-name { display: flex; align-items: center; gap: 8px; font-size: .82rem; color: var(--text); }
.bt-connect-btn {
  background: var(--color-accent); color: #fff; border: none;
  padding: 5px 14px; border-radius: 20px; font-size: .72rem; cursor: pointer;
  font-family: inherit; transition: opacity .2s;
}
.bt-connect-btn:disabled { opacity: 0.6; cursor: default; }
.bt-success-text { color: #b08060; font-size: .85rem; font-weight: 600; text-align: center; }
.bt-success-desc { font-size: .75rem; color: var(--muted); text-align: center; line-height: 1.7; }
.bt-close-btn {
  width: 100%; padding: 11px; border-radius: 14px; border: none;
  background: rgba(149,139,130,0.1); color: var(--text); font-size: .8rem;
  font-family: inherit; cursor: pointer; transition: background .2s; margin-top: 4px;
}
.bt-close-btn:hover { background: rgba(149,139,130,0.2); }

</style>
</head>
<body>

<div class="intro-overlay" id="introOverlay">
  <div class="intro-content">
    <div class="intro-orb"></div>
    <div class="intro-title">島嶼時光</div>
    <div class="intro-subtitle">靜靜地，種下一顆時間的種子...</div>
  </div>
</div>

<div class="page" id="mainPage">
  <header class="header">
    <h1 class="header-title">島嶼時光</h1>
    <div class="header-actions" style="display:flex;gap:8px;">
      <button class="small-btn" onclick="openBtModal()">📦 實體方塊</button>
      <button class="small-btn" onclick="toggleGallery(true)">📖 封存圖鑑</button>
    </div>
  </header>

  <div class="island-section">
    <div class="island-canvas-wrap">
      <canvas id="islandCanvas" width="400" height="400"></canvas>
      <canvas id="particleCanvas" width="400" height="400"></canvas>
    </div>
  </div>

  <div class="healing-message-box" id="healingMessage">
    給自己設定一個不受打擾的時間，讓島嶼靜靜陪著你發芽。
  </div>

  <div class="timer-panel">
    <div class="progress-ring-wrap"><div class="progress-ring-fill" id="progressFill"></div></div>
    <div class="timer-display-wrap">
      <div class="time-numbers" id="timeDisplay">10:00</div>
      <button class="anxiety-toggle" id="anxietyBtn" onclick="toggleAnxietyMode()">🔍 模糊時間</button>
    </div>
    <div class="preset-row" id="presetRow">
      <button class="preset-btn active" data-mins="10">10 分</button>
      <button class="preset-btn" data-mins="25">25 分</button>
      <button class="preset-btn" data-mins="45">45 分</button>
      <div class="preset-input-wrap"><input type="number" id="customTimeInput" class="preset-input" placeholder="自訂分" min="1" max="999"></div>
    </div>
    <div class="controls-row">
      <button class="secondary-control-btn" id="resetBtn" style="visibility: hidden;" onclick="resetTimer()">先到這裡就好</button>
      <button class="main-control-btn" id="startBtn" onclick="toggleTimer()">▶</button>
      <span style="width: 86px; display: inline-block;" id="spacer"></span>
    </div>
  </div>
</div>

<div class="postcard-modal" id="postcardModal">
  <div class="postcard-card">
    <div class="postcard-photo-frame"><canvas class="postcard-canvas" id="postcardCanvas" width="400" height="400"></canvas></div>
    <div class="postcard-content">
      <div class="postcard-meta-row"><span class="postcard-date" id="postcardDate"></span><div class="postcard-stamp">時光</div></div>
      <div class="postcard-warm-quote" id="postcardQuote"></div>
      <input type="text" class="postcard-user-note" id="postcardUserNote" placeholder="寫下一句今天的心情..." maxlength="20">
    </div>
    <div class="postcard-btns">
      <button class="postcard-btn cancel" onclick="closePostcardModal()">默默離開</button>
      <button class="postcard-btn save" onclick="savePostcard()">收進圖鑑</button>
    </div>
  </div>
</div>

<div class="overlay" id="overlay" onclick="toggleGallery(false)"></div>
<div class="gallery-sidebar" id="gallerySidebar">
  <div class="gallery-header"><h2>🏝️ 封存的明信片</h2><button class="close-btn" onclick="toggleGallery(false)">✕</button></div>
  <div class="gallery-content" id="galleryContent"></div>
</div>

<div class="view-modal" id="viewModal" onclick="closeViewModal()">
  <div class="postcard-card" style="box-shadow: 0 15px 40px rgba(92, 80, 68, 0.2);" onclick="event.stopPropagation()">
    <div class="postcard-photo-frame"><canvas class="postcard-canvas" id="viewPostcardCanvas" width="400" height="400"></canvas></div>
    <div class="postcard-content">
      <div class="postcard-meta-row"><span class="postcard-date" id="viewPostcardDate"></span><div class="postcard-stamp">時光</div></div>
      <div class="postcard-warm-quote" id="viewPostcardQuote"></div>
      <div class="postcard-item-note" id="viewPostcardUserNote" style="font-size: .83rem; border:none;"></div>
    </div>
    <button class="postcard-btn cancel" style="width: 100%;" onclick="closeViewModal()">關閉</button>
  </div>
</div>

<script>
// ── 文案集 ──
const IDLE_MESSAGES = ["找個舒服的姿勢，讓島嶼陪著你發芽。","拖延只是累了，沒關係的，我們慢慢來。","這段時間不屬於任何人，只屬於你和你的小島。"];
const RUNNING_MESSAGES = ["植物正在土裡安靜地發芽...","不需要急著看到結果，停留在這裡就是一種灌溉。","時間流動的聲音很輕。我們正一起往前走呢。"];
const PAUSED_MESSAGES = ["天空下起了一場雨，我們正好休息一下。","雨滴落在水面上... 等你想繼續時隨時都可以。","停下來深呼吸，你沒有落後任何事情。"];
const COMPLETION_QUOTES = ["今天你也溫柔地前進了一步。這座島嶼，是你的溫柔凝聚而成的。","在漫長的時光裡，你是一朵靜靜盛開、無比珍貴的花。","雨停的時候，空氣裡都是安靜的味道。謝謝你今天的陪伴。"];
const STOPPED_EARLY_MESSAGES = ["辛苦了，能開始就已經很棒了，今天先到這裡就好。","累了就休息，我們不趕時間。","把進度輕輕放下，去喝杯水、伸個懶腰吧。"];

let timerState = 'idle'; let timerDuration = 600; let timeRemaining = 600; let timerInterval = null; let animationId = null;
let currentIslandSeed = Math.random() * 1000; let savedPostcards = []; let lastVisibleCount = 0; let growParticles = []; let rainDrops = [];
let pCanvas, pCtx, canvas, ctx;

function rng(seed) { let x = Math.sin(seed) * 10000; return x - Math.floor(x); }
function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ════════════════════════════════════════════════════════════════
// 【零變形！自動真實比例技術】
// 完全依靠圖片的 naturalWidth 和 naturalHeight 自動換算比例！
// 只給定寬度，高度讓圖片自己長出來，保證絕不變形、不拉伸！
// ════════════════════════════════════════════════════════════════
class ArtAsset {
  constructor(id, src, fallbackColor, targetWidth) {
    this.id = id;
    this.img = new Image();
    this.img.crossOrigin = "anonymous"; 
    this.loaded = false;
    this.fallbackColor = fallbackColor;
    
    this.displayWidth = targetWidth;   
    this.displayHeight = targetWidth; 
    
    this.img.onload = () => { 
      this.loaded = true; 
      this.displayHeight = (this.img.naturalHeight / this.img.naturalWidth) * this.displayWidth;
    };
    this.img.onerror = () => {
      if (this.img.crossOrigin) {
        this.img = new Image(); this.img.onload = () => { 
          this.loaded = true; 
          this.displayHeight = (this.img.naturalHeight / this.img.naturalWidth) * this.displayWidth;
        }; 
        this.img.src = src;
      }
    };
    if(src) this.img.src = src;
  }
}

// 根據 x 查詢島嶼頂部 y（找最近的有效值）
function getIslandTopY(x) {
  x = Math.round(x);
  if (ISLAND_TOP[x] !== undefined) return ISLAND_TOP[x];
  // 往兩邊找最近有效值
  for (let d = 1; d < 20; d++) {
    if (ISLAND_TOP[x+d] !== undefined) return ISLAND_TOP[x+d];
    if (ISLAND_TOP[x-d] !== undefined) return ISLAND_TOP[x-d];
  }
  return 270; // fallback
}

// 種植區定義：兩個山丘各自的 x 範圍
// 左丘（較大）：x=80~200，右丘（較小）：x=215~355
// pool 定義：樹種類型，scale 範圍，丘別
const PLANT_DEFS = [
  // 左丘：3棵樹 + 1灌木
  { pool: ['tree_tall', 'tree_round'],  xMin: 90,  xMax: 175, scaleMin: 0.55, scaleMax: 0.75, hill: 'L' },
  { pool: ['tree_round', 'tree_small'], xMin: 110, xMax: 185, scaleMin: 0.45, scaleMax: 0.65, hill: 'L' },
  { pool: ['tree_small'],               xMin: 80,  xMax: 155, scaleMin: 0.4,  scaleMax: 0.55, hill: 'L' },
  { pool: ['bush', 'bush_dots'],        xMin: 75,  xMax: 190, scaleMin: 0.35, scaleMax: 0.5,  hill: 'L' },
  // 右丘：2棵樹 + 1灌木 + rock
  { pool: ['tree_tall', 'tree_small'],  xMin: 225, xMax: 320, scaleMin: 0.45, scaleMax: 0.62, hill: 'R' },
  { pool: ['tree_round'],               xMin: 230, xMax: 330, scaleMin: 0.38, scaleMax: 0.55, hill: 'R' },
  { pool: ['bush_dots', 'rock'],        xMin: 215, xMax: 350, scaleMin: 0.3,  scaleMax: 0.48, hill: 'R' },
];
// (SLOTS replaced by PLANT_DEFS above)

function drawItemAnchored(ctx, asset, rootX, rootY, scale) {
  if (!asset.loaded) {
    ctx.fillStyle = asset.fallbackColor;
    ctx.beginPath();
    ctx.ellipse(rootX, rootY - 10, asset.displayWidth*scale/3, asset.displayWidth*scale/4, 0, 0, Math.PI*2);
    ctx.fill();
    return;
  }
  
  ctx.save();
  ctx.translate(rootX, rootY);
  ctx.scale(scale, scale);
  
  // 裁切乾淨後，最下方就是樹根！所以對齊 -asset.displayHeight 就對了！
  ctx.drawImage(asset.img, -asset.displayWidth / 2, -asset.displayHeight, asset.displayWidth, asset.displayHeight);
  
  ctx.restore();
}

function spawnGrowParticles(x, y) {
  for(let i=0; i<15; i++) {
    growParticles.push({
      x: x, y: y,
      vx: (Math.random() - 0.5) * 5, vy: (Math.random() - 0.5) * 5 - 2,
      life: 1.0, decay: Math.random() * 0.03 + 0.015,
      size: Math.random() * 3 + 1.5,
      color: ['#dfbe9b', '#cdad8d', '#fff', '#e3d8cd'][Math.floor(Math.random()*4)]
    });
  }
}

function updateGrowParticles(ctx) {
  growParticles.forEach(p => {
    p.x += p.vx; p.y += p.vy; p.life -= p.decay;
    ctx.fillStyle = p.color; ctx.globalAlpha = Math.max(0, p.life);
    ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
  });
  growParticles = growParticles.filter(p => p.life > 0);
  ctx.globalAlpha = 1.0;
}

function renderIslandBase(context, W, H, progressRatio, timestamp, isPaused, islandSeed) {
  context.clearRect(0, 0, W, H);
  
  // 1. 小島底圖直接完美填滿畫布，絕不移位
  if (ASSETS.base.loaded) {
    context.drawImage(ASSETS.base.img, 0, 0, W, H);
  } else {
    context.fillStyle = ASSETS.base.fallbackColor;
    context.beginPath();
    context.ellipse(W/2, H/2 + 50, 150, 40, 0, 0, Math.PI*2);
    context.fill();
  }

  const maxPlants = PLANT_DEFS.length;
  let visibleCount = Math.floor(progressRatio * maxPlants);
  if (progressRatio >= 0.99) visibleCount = maxPlants;

  let itemsToDraw = [];

  for (let i = 0; i < visibleCount; i++) {
    const seed = islandSeed + i * 17;
    const def = PLANT_DEFS[i];

    // 根據 seed 在該植物的 x 範圍內隨機取點
    const mx = def.xMin + rng(seed) * (def.xMax - def.xMin);
    // 查島嶼頂部 y，根部貼著山頂
    const topY = getIslandTopY(mx);
    const my = topY + 2; // 稍微嵌入山頂 2px，讓根部不浮空

    const typeIdx = Math.floor(rng(seed + 3) * def.pool.length);
    const asset = ASSETS[def.pool[typeIdx]];

    const appearThreshold = i / maxPlants;
    const individualProgress = Math.min(1, (progressRatio - appearThreshold) * maxPlants * 2);

    const breathe = isPaused ? 0 : Math.sin(timestamp * 0.002 + seed) * 0.015;
    const randomScale = def.scaleMin + rng(seed + 1) * (def.scaleMax - def.scaleMin);
    const finalScale = individualProgress * (randomScale + breathe);

    if (finalScale > 0) {
      // z-order：y 越大越晚畫（越前景）
      itemsToDraw.push({ asset, x: mx, y: my, z: my, scale: finalScale, seedRef: seed, rsRef: randomScale });
    }

    if (i >= lastVisibleCount && individualProgress > 0.05 && progressRatio > 0 && progressRatio < 0.99) {
      spawnGrowParticles(mx, my - (asset.displayHeight * randomScale * 0.5));
    }
  }

  if (visibleCount > lastVisibleCount) lastVisibleCount = visibleCount;

  itemsToDraw.sort((a, b) => a.y - b.y);

  itemsToDraw.forEach(item => {
    drawItemAnchored(context, item.asset, item.x, item.y, item.scale);
  });
}

class RainDrop {
  constructor() { this.reset(true); }
  reset(initRandomY = false) {
    this.x = Math.random() * (pCanvas.width + 80) - 40;
    this.y = initRandomY ? Math.random() * pCanvas.height : -15;
    this.vy = Math.random() * 3 + 3;
    this.vx = -0.3; this.len = Math.random() * 8 + 6; this.alpha = Math.random() * 0.2 + 0.1;
  }
  update() {
    this.x += this.vx; this.y += this.vy;
    if (this.y > pCanvas.height) this.reset(false);
  }
  draw(ctx) {
    ctx.strokeStyle = `rgba(255, 255, 255, ${this.alpha})`; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(this.x, this.y); ctx.lineTo(this.x + this.vx, this.y + this.len); ctx.stroke();
  }
}

function updateParticles() {
  pCtx.clearRect(0, 0, pCanvas.width, pCanvas.height);
  if (timerState === 'paused') { rainDrops.forEach(drop => { drop.update(); drop.draw(pCtx); }); }
  updateGrowParticles(pCtx);
}

function renderIslandAnim() {
  if (animationId) cancelAnimationFrame(animationId);
  const loop = (ts) => {
    let progress = timerDuration > 0 ? (timerDuration - timeRemaining) / timerDuration : 0;
    progress = Math.min(1, Math.max(0, progress));
    renderIslandBase(ctx, 400, 400, progress, ts, timerState === 'paused', currentIslandSeed);
    updateParticles();
    animationId = requestAnimationFrame(loop);
  };
  animationId = requestAnimationFrame(loop);
}

// ── 介面互動邏輯 ──
function updateTimerDisplay() {
  const mins = Math.floor(timeRemaining / 60); const secs = timeRemaining % 60;
  document.getElementById('timeDisplay').textContent = `${String(mins).padStart(2,'0')}:${String(secs).padStart(2,'0')}`;
  document.getElementById('progressFill').style.width = (((timerDuration - timeRemaining) / timerDuration) * 100) + '%';
}

function selectPreset(mins, element) {
  if (timerState !== 'idle') return;
  timerDuration = mins * 60; timeRemaining = timerDuration; lastVisibleCount = 0;
  document.querySelectorAll('.preset-btn').forEach(btn => btn.classList.remove('active'));
  document.getElementById('customTimeInput').value = ''; 
  if (element) element.classList.add('active');
  updateTimerDisplay();
}

document.getElementById('customTimeInput').addEventListener('input', function() {
  if (timerState !== 'idle') return;
  let val = parseInt(this.value);
  if (isNaN(val) || val <= 0) val = 1; if (val > 999) val = 999;
  document.querySelectorAll('.preset-btn').forEach(btn => btn.classList.remove('active'));
  timerDuration = val * 60; timeRemaining = timerDuration; lastVisibleCount = 0;
  updateTimerDisplay();
});

function setHealingMessage(text) {
  const box = document.getElementById('healingMessage');
  box.style.opacity = 0; setTimeout(() => { box.textContent = text; box.style.opacity = 1; }, 250);
}

function toggleTimer() {
  const startBtn = document.getElementById('startBtn'), resetBtn = document.getElementById('resetBtn'), spacer = document.getElementById('spacer');
  const presetBtns = document.querySelectorAll('.preset-btn'), customInput = document.getElementById('customTimeInput');

  if (timerState === 'idle' || timerState === 'paused') {
    timerState = 'running'; document.body.classList.remove('rainy-mode'); 
    startBtn.textContent = '⏸'; resetBtn.style.visibility = 'visible'; spacer.style.display = 'none';
    presetBtns.forEach(btn => btn.disabled = true); customInput.disabled = true;
    setHealingMessage(RUNNING_MESSAGES[Math.floor(Math.random() * RUNNING_MESSAGES.length)]);

    timerInterval = setInterval(() => {
      if (timeRemaining > 0) {
        timeRemaining--; updateTimerDisplay();
        if (timeRemaining % 120 === 0) setHealingMessage(RUNNING_MESSAGES[Math.floor(Math.random() * RUNNING_MESSAGES.length)]);
      } else completeFocusSession();
    }, 1000);
  } else if (timerState === 'running') {
    timerState = 'paused'; clearInterval(timerInterval);
    document.body.classList.add('rainy-mode'); startBtn.textContent = '▶';
    setHealingMessage(PAUSED_MESSAGES[Math.floor(Math.random() * PAUSED_MESSAGES.length)]);
  }
}

function resetTimer() {
  clearInterval(timerInterval); timerState = 'idle'; timeRemaining = timerDuration; lastVisibleCount = 0;
  document.body.classList.remove('rainy-mode');
  document.getElementById('startBtn').textContent = '▶';
  document.getElementById('resetBtn').style.visibility = 'hidden';
  document.getElementById('spacer').style.display = 'inline-block';
  document.querySelectorAll('.preset-btn').forEach(btn => btn.disabled = false);
  document.getElementById('customTimeInput').disabled = false;
  setHealingMessage(STOPPED_EARLY_MESSAGES[Math.floor(Math.random() * STOPPED_EARLY_MESSAGES.length)]);
  currentIslandSeed = Math.random() * 1000; updateTimerDisplay();
}

function completeFocusSession() {
  const sessionSeed = currentIslandSeed; // 先保存當前 seed，resetTimer 會覆蓋它
  resetTimer(); 
  currentIslandSeed = sessionSeed; // 還原本次 seed 供明信片使用
  setHealingMessage("時間到了，辛苦了。");
  
  const pCanvas = document.getElementById('postcardCanvas');
  renderIslandBase(pCanvas.getContext('2d'), 400, 400, 1.0, 0, true, sessionSeed);

  const today = new Date();
  document.getElementById('postcardDate').textContent = `${today.getFullYear()}.${String(today.getMonth()+1).padStart(2,'0')}.${String(today.getDate()).padStart(2,'0')}`;
  document.getElementById('postcardQuote').textContent = COMPLETION_QUOTES[Math.floor(Math.random() * COMPLETION_QUOTES.length)];
  document.getElementById('postcardUserNote').value = '';
  document.getElementById('postcardModal').classList.add('open');
}

function closePostcardModal() {
  document.getElementById('postcardModal').classList.remove('open');
  currentIslandSeed = Math.random() * 1000; lastVisibleCount = 0; updateTimerDisplay();
  setHealingMessage(IDLE_MESSAGES[Math.floor(Math.random() * IDLE_MESSAGES.length)]);
}

function savePostcard() {
  const note = document.getElementById('postcardUserNote').value.trim() || '今天，我也努力度過了這段時光。';
  
  savedPostcards.unshift({ 
    id: Date.now(), 
    date: document.getElementById('postcardDate').textContent, 
    seed: currentIslandSeed, 
    quote: document.getElementById('postcardQuote').textContent, 
    note: note 
  });
  
  try { localStorage.setItem('islandPostcards', JSON.stringify(savedPostcards)); } catch(e) {}
  closePostcardModal(); setTimeout(() => toggleGallery(true), 400);
}

function toggleAnxietyMode() {
  const display = document.getElementById('timeDisplay'), btn = document.getElementById('anxietyBtn');
  if (display.classList.contains('anxiety-free')) { display.classList.remove('anxiety-free'); btn.textContent = '🔍 模糊時間'; } 
  else { display.classList.add('anxiety-free'); btn.textContent = '👀 精準時間'; }
}

function toggleGallery(open) {
  const sb = document.getElementById('gallerySidebar'), ov = document.getElementById('overlay');
  if (open) { sb.classList.add('open'); ov.classList.add('visible'); renderGallery(); } 
  else { sb.classList.remove('open'); ov.classList.remove('visible'); }
}

function renderGallery() {
  const content = document.getElementById('galleryContent');
  if (!savedPostcards.length) {
    content.innerHTML = `<div class="gallery-empty"><p>圖鑑目前空空如也 🌿</p><p style="font-size:.68rem;margin-top:6px;">完成一次靜心後，就能收到明信片囉。</p></div>`; return;
  }
  
  content.innerHTML = savedPostcards.map(card => `
    <div class="postcard-item" onclick="viewPostcard(${card.id})">
      <canvas class="postcard-item-canvas" id="thumb-${card.id}" width="400" height="400"></canvas>
      <div class="postcard-item-meta"><span>📅 ${card.date}</span><span style="color:var(--color-progress);">💌 已收藏</span></div>
      <div class="postcard-item-note">${esc(card.note)}</div>
    </div>
  `).join('');

  savedPostcards.forEach(card => {
    if(card.seed !== undefined) {
      const c = document.getElementById(`thumb-${card.id}`);
      renderIslandBase(c.getContext('2d'), 400, 400, 1.0, 0, true, card.seed);
    }
  });
}

function viewPostcard(id) {
  const card = savedPostcards.find(c => c.id === id); if (!card) return;
  
  renderIslandBase(document.getElementById('viewPostcardCanvas').getContext('2d'), 400, 400, 1.0, 0, true, card.seed);
  
  document.getElementById('viewPostcardDate').textContent = card.date;
  document.getElementById('viewPostcardQuote').textContent = card.quote; document.getElementById('viewPostcardUserNote').textContent = card.note;
  document.getElementById('viewModal').classList.add('open');
}
function closeViewModal() { document.getElementById('viewModal').classList.remove('open'); }

window.addEventListener('DOMContentLoaded', () => {
  pCanvas = document.getElementById('particleCanvas');
  pCtx = pCanvas.getContext('2d');
  canvas = document.getElementById('islandCanvas');
  ctx = canvas.getContext('2d');

  for(let i=0; i<35; i++) rainDrops.push(new RainDrop());

  try { const data = localStorage.getItem('islandPostcards'); if (data) savedPostcards = JSON.parse(data); } catch(e) {}

  document.querySelectorAll('.preset-btn').forEach(btn => {
    btn.addEventListener('click', (e) => selectPreset(parseInt(e.target.getAttribute('data-mins')), e.target));
  });

  document.getElementById('customTimeInput').addEventListener('input', function() {
    if (timerState !== 'idle') return;
    let val = parseInt(this.value);
    if (isNaN(val) || val <= 0) val = 1; if (val > 999) val = 999;
    document.querySelectorAll('.preset-btn').forEach(btn => btn.classList.remove('active'));
    timerDuration = val * 60; timeRemaining = timerDuration; lastVisibleCount = 0;
    updateTimerDisplay();
  });

  updateTimerDisplay();
  renderIslandAnim();

  setTimeout(() => {
    document.getElementById('introOverlay').classList.add('fade-out');
    document.getElementById('mainPage').classList.add('loaded');
    setHealingMessage(IDLE_MESSAGES[Math.floor(Math.random() * IDLE_MESSAGES.length)]);
  }, 1800);
});


// ── 藍牙模擬介面 ──
let btPhase = 'idle'; // idle | scanning | found | connecting | connected
let btTimer = null;

function openBtModal() {
  document.getElementById('btModal').classList.add('open');
  btPhase = 'scanning';
  renderBtPhase();
  btTimer = setTimeout(() => {
    btPhase = 'found';
    renderBtPhase();
  }, 1800);
}

function closeBtModal() {
  document.getElementById('btModal').classList.remove('open');
  clearTimeout(btTimer);
  btPhase = 'idle';
}

function btConnect() {
  if (btPhase !== 'found') return;
  btPhase = 'connecting';
  renderBtPhase();
  btTimer = setTimeout(() => {
    btPhase = 'connected';
    renderBtPhase();
  }, 1600);
}

function renderBtPhase() {
  const body = document.getElementById('btBody');
  if (btPhase === 'scanning') {
    body.innerHTML = `
      <div class="bt-icon-wrap scanning">
        <div class="bt-cube">📦</div>
      </div>
      <div class="bt-subtitle">正在尋找附近的實體方塊...</div>
    `;
  } else if (btPhase === 'found') {
    body.innerHTML = `
      <div class="bt-subtitle">找到 1 個相容的全息裝置：</div>
      <div class="bt-device-row">
        <div class="bt-device-name">📦 HoloCube_Island</div>
        <button class="bt-connect-btn" onclick="btConnect()">連線</button>
      </div>
    `;
  } else if (btPhase === 'connecting') {
    body.innerHTML = `
      <div class="bt-subtitle">正在建立藍牙握手...</div>
      <div class="bt-device-row">
        <div class="bt-device-name">📦 HoloCube_Island</div>
        <button class="bt-connect-btn" disabled>連線中...</button>
      </div>
    `;
  } else if (btPhase === 'connected') {
    body.innerHTML = `
      <div class="bt-icon-wrap">
        <div class="bt-cube" style="background:linear-gradient(135deg,#c3a483,#8a7b6d);">🏝️</div>
      </div>
      <div class="bt-success-text">連線成功！</div>
      <div class="bt-success-desc">島嶼數據已同步至全息方塊，<br>實體植物將會隨您的專注時間同步生長。</div>
    `;
  }
}
