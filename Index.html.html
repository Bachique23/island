<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>島嶼時光</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;600&family=Kaisei+Decol:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #e1d6cc;
  --accent:  #9e8f81;
  --accent2: #8a7b6d;
  --gold:    #d2ad8a;
  --text:    #5c5044;
  --muted:   #958b82;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  background: var(--bg);
  min-height: 100vh; min-height: 100dvh;
  font-family: 'Noto Serif TC', serif;
  color: var(--text);
  overflow-x: hidden;
  -webkit-tap-highlight-color: transparent;
}

/* ── 入場動畫 ── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(18px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes float {
  0%,100% { transform: translateY(0px); }
  50%      { transform: translateY(-6px); }
}
@keyframes shimmer {
  0%,100% { opacity: 0.5; }
  50%      { opacity: 1; }
}

.page {
  min-height: 100vh; min-height: 100dvh;
  display: flex; flex-direction: column;
  align-items: center; justify-content: space-between;
  padding: 60px 28px 48px;
  max-width: 480px; margin: 0 auto;
}

/* ── 頂部標題區 ── */
.top-section {
  text-align: center;
  animation: fadeUp .9s ease both;
}
.brand-label {
  font-size: .65rem; letter-spacing: .3em;
  color: var(--muted); margin-bottom: 14px;
  text-transform: uppercase;
}
.main-title {
  font-family: 'Kaisei Decol', serif;
  font-size: 2.4rem; font-weight: 700;
  color: var(--text); letter-spacing: .08em;
  line-height: 1.2; margin-bottom: 10px;
}
.sub-title {
  font-size: .82rem; color: var(--muted);
  letter-spacing: .12em; line-height: 1.8;
}

/* ── 島嶼插圖區 ── */
.island-wrap {
  width: 100%; max-width: 340px;
  animation: fadeUp 1.1s .2s ease both;
  position: relative;
  display: flex; flex-direction: column; align-items: center;
}
.island-img {
  width: 100%; animation: float 4s ease-in-out infinite;
  filter: drop-shadow(0 12px 24px rgba(92,80,68,0.12));
}

/* 裝飾文字浮在圖上方 */
.island-quote {
  font-size: .72rem; color: var(--muted);
  letter-spacing: .15em; margin-bottom: 16px;
  animation: shimmer 3s ease-in-out infinite;
}

/* ── 功能卡片區 ── */
.cards {
  width: 100%; display: flex; flex-direction: column; gap: 12px;
  animation: fadeUp 1.1s .4s ease both;
}

.card-main {
  width: 100%;
  background: rgba(158,143,129,0.18);
  border: 1px solid rgba(158,143,129,0.25);
  border-radius: 20px; padding: 22px 24px;
  cursor: pointer; transition: transform .2s, background .2s;
  text-decoration: none; display: block;
  position: relative; overflow: hidden;
}
.card-main:active { transform: scale(0.98); }
.card-main::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(210,173,138,0.6), transparent);
}
.card-main-inner {
  display: flex; align-items: center; justify-content: space-between;
}
.card-main-text { flex: 1; }
.card-tag {
  font-size: .6rem; letter-spacing: .2em; color: var(--gold);
  margin-bottom: 6px; text-transform: uppercase;
}
.card-title {
  font-family: 'Kaisei Decol', serif;
  font-size: 1.15rem; color: var(--text);
  margin-bottom: 4px;
}
.card-desc {
  font-size: .72rem; color: var(--muted); line-height: 1.6;
}
.card-arrow {
  width: 36px; height: 36px; border-radius: 50%;
  background: var(--accent); color: #fff;
  display: flex; align-items: center; justify-content: center;
  font-size: .9rem; flex-shrink: 0; margin-left: 16px;
  box-shadow: 0 4px 10px rgba(138,123,109,0.25);
}

.cards-row { display: flex; gap: 12px; }
.card-small {
  flex: 1;
  background: rgba(158,143,129,0.12);
  border: 1px solid rgba(158,143,129,0.2);
  border-radius: 16px; padding: 16px;
  cursor: pointer; transition: transform .2s;
  text-decoration: none; display: block;
  text-align: center;
}
.card-small:active { transform: scale(0.97); }
.card-small-icon { font-size: 1.4rem; margin-bottom: 8px; }
.card-small-title {
  font-size: .75rem; color: var(--text);
  letter-spacing: .05em;
}
.card-small-desc {
  font-size: .62rem; color: var(--muted);
  margin-top: 3px; line-height: 1.5;
}

/* ── 底部版權 ── */
.footer {
  text-align: center;
  animation: fadeUp 1.1s .6s ease both;
}
.footer-text {
  font-size: .6rem; color: var(--muted);
  letter-spacing: .15em; opacity: 0.7;
  line-height: 2;
}
.footer-dot {
  display: inline-block; width: 3px; height: 3px;
  border-radius: 50%; background: var(--gold);
  vertical-align: middle; margin: 0 6px;
  animation: shimmer 2s ease-in-out infinite;
}

/* ── 進入動畫 overlay ── */
.intro {
  position: fixed; inset: 0; background: var(--bg);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  z-index: 100; transition: opacity .8s ease, visibility .8s;
}
.intro.hide { opacity: 0; visibility: hidden; }
.intro-orb {
  width: 44px; height: 56px;
  background: linear-gradient(160deg, #d2ad8a, #9e8f81);
  border-radius: 40px 40px 8px 8px;
  margin-bottom: 18px;
  animation: float 2.5s ease-in-out infinite;
  box-shadow: 0 8px 20px rgba(138,123,109,0.2);
}
.intro-orb::after {
  content: '';
  display: block; width: 4px; height: 12px;
  background: var(--accent2); border-radius: 2px;
  margin: 4px auto 0;
}
.intro-label {
  font-family: 'Kaisei Decol', serif;
  font-size: 1.2rem; color: var(--text);
  letter-spacing: .12em;
}
</style>
</head>

  <div class="intro-label">島嶼時光</div>
